<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- White background -->
  <rect width="1024" height="1024" fill="white"/>

  <!-- Calendar body - soft rounded -->
  <rect x="172" y="220" width="680" height="620" rx="56" fill="white" stroke="#e2e8f0" stroke-width="6"/>

  <!-- Calendar header bar - soft mint -->
  <rect x="172" y="220" width="680" height="140" rx="56" fill="#86efac"/>
  <rect x="172" y="300" width="680" height="60" fill="#86efac"/>

  <!-- Calendar ring holders -->
  <rect x="340" y="176" width="40" height="88" rx="20" fill="#4ade80"/>
  <rect x="644" y="176" width="40" height="88" rx="20" fill="#4ade80"/>

  <!-- Calendar date dots row 1 -->
  <circle cx="320" cy="480" r="18" fill="#cbd5e1"/>
  <circle cx="432" cy="480" r="18" fill="#cbd5e1"/>
  <circle cx="544" cy="480" r="18" fill="#86efac"/>
  <circle cx="656" cy="480" r="18" fill="#cbd5e1"/>

  <!-- Calendar date dots row 2 -->
  <circle cx="320" cy="568" r="18" fill="#cbd5e1"/>
  <circle cx="432" cy="568" r="18" fill="#cbd5e1"/>
  <circle cx="544" cy="568" r="18" fill="#cbd5e1"/>
  <circle cx="656" cy="568" r="18" fill="#cbd5e1"/>

  <!-- Calendar date dots row 3 -->
  <circle cx="320" cy="656" r="18" fill="#cbd5e1"/>
  <circle cx="432" cy="656" r="18" fill="#cbd5e1"/>

  <!-- Letter/envelope floating from calendar - tilted -->
  <g transform="translate(600, 580) rotate(-15)">
    <!-- Envelope body -->
    <rect x="0" y="0" width="200" height="140" rx="20" fill="#bae6fd" stroke="white" stroke-width="8"/>
    <!-- Envelope flap -->
    <path d="M8 8 L100 70 L192 8" stroke="white" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Small heart on envelope -->
    <path d="M88 90 C88 83 96 76 104 84 C112 76 120 83 120 90 C120 102 104 112 104 112 C104 112 88 102 88 90Z" fill="#f9a8d4"/>
  </g>

  <!-- Small sparkle accents -->
  <g fill="#fbbf24" opacity="0.7">
    <path d="M760 200 L768 220 L760 240 L752 220Z"/>
    <path d="M750 220 L770 212 L790 220 L770 228Z"/>
  </g>
  <g fill="#c4b5fd" opacity="0.6">
    <path d="M220 680 L226 694 L220 708 L214 694Z"/>
    <path d="M212 694 L228 688 L244 694 L228 700Z"/>
  </g>
</svg>
