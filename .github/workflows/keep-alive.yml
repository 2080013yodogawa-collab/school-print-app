name: Supabase Keep Alive

# Supabase無料プランは7日間アクセスがないとプロジェクトが自動一時停止される。
# このワークフローは週1回Supabase REST APIを叩いて休眠を防ぐ。
# 利用頻度が低いプロジェクト向けのkeep-alive。

on:
  schedule:
    # 毎週月曜 午前3時 (UTC) = 日本時間 月曜 正午
    - cron: '0 3 * * 1'
  # 手動実行用（動作確認・緊急時）
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase table (keeps DB active)
        run: |
          # 実テーブルを1行SELECTして、Supabaseに「DBが使われている」と認識させる。
          # ルート(/rest/v1/)を叩くだけだとDBに触らないので休眠判定を回避できない。
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/families?select=id&limit=1")

          STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $STATUS"
          echo "Body: $BODY"

          if [[ "$STATUS" =~ ^2 ]]; then
            echo "✅ Supabase DB query succeeded — project kept alive"
            exit 0
          else
            echo "❌ Unexpected status code: $STATUS"
            exit 1
          fi
